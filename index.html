    <section id="page-home" class="page active pt-24 min-h-screen">

        <div class="px-6 mb-8 overflow-x-auto no-scrollbar flex gap-3">
            <button onclick="filterMovies('all')" class="cat-btn active-cat px-6 py-2.5 rounded-2xl text-[10px] font-black whitespace-nowrap uppercase">Zose</button>
            <button onclick="filterMovies('trending')" class="cat-btn category-btn px-6 py-2.5 rounded-2xl text-[10px] font-black whitespace-nowrap uppercase">Trending</button>

            <button onclick="handleLogin()" class="w-full red-gradient py-4 rounded-xl font-black uppercase">Injira</button>

                    <input type="text" id="mTitle" placeholder="Title" class="w-full bg-white p-3 rounded-lg outline-none text-sm">

                    <select id="mCat" class="w-full bg-white p-3 rounded-lg outline-none text-sm">

                    <input type="text" id="mLink" placeholder="Watch Link" class="w-full bg-white p-3 rounded-lg outline-none text-sm">

                    <input type="text" id="mPoster" placeholder="Poster URL" class="w-full bg-white p-3 rounded-lg outline-none text-sm">
                    <button onclick="saveToFirebase()" class="w-full red-gradient py-3 rounded-lg font-black text-white uppercase">Save</button>
                </div>
            </div>
            <div class="lg:col-span-2 space-y-4">
                <div id="adminMovieList" class="grid gap-3"></div>
            </div>
        </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBlq2acq1pUcZAecjemVxS1UoVaPrOMAQc",
            authDomain: "bassamfilms-1d584.firebaseapp.com",
            databaseURL: "https://bassamfilms-1d584-default-rtdb.firebaseio.com",
            projectId: "bassamfilms-1d584",
            storageBucket: "bassamfilms-1d584.firebasestorage.app",
            messagingSenderId: "313527595091",
            appId: "1:313527595091:web:53847778813445832a56a6"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const smartLink = "https://www.profitablecpmratenetwork.com/x66g8e2ere?key=5ff83b3548a532596c7420d3474a1354";

        let allMovies = [];

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${id}`).classList.add('active');
        }

        function handleLogin() {
            if(document.getElementById('userIn').value === "bassam" && document.getElementById('passIn').value === "54321") showPage('admin');
            else alert("Username cyangwa Password ntabwo ariyo!");
        }
 const smartLink = "https://www.profitablecpmratenetwork.com/k7qhg8zb?key=242711b32563bfddb8e983edfab25833";
        function handleDownload(realLink, movieId) {
            const hasClicked = localStorage.getItem('ad_' + movieId);
            if (!hasClicked) { window.open(smartLink, '_blank'); localStorage.setItem('ad_' + movieId, 'true'); }
            else { window.open(realLink, '_blank'); localStorage.removeItem('ad_' + movieId); }
        }

        function saveToFirebase() {
            const movieData = {
                title: document.getElementById('mTitle').value,
                year: document.getElementById('mYear').value,
                category: document.getElementById('mCat').value,
                link: document.getElementById('mLink').value,
                download: document.getElementById('mDL').value,
                poster: document.getElementById('mPoster').value
            };
            if(movieData.title && movieData.link) {
                database.ref('movies').push(movieData).then(() => {
                    alert("Byagezeho!");
                    location.reload();
                });
            }
        }

        database.ref('movies').on('value', (snapshot) => {
            allMovies = [];
            snapshot.forEach((child) => { allMovies.unshift({ id: child.key, ...child.val() }); });
            renderHome(allMovies);
            renderAdmin();
        });

        function renderHome(data) {
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = data.map(m => `
                <div class="group bg-zinc-900 rounded-[2rem] overflow-hidden shadow-2xl transition hover:translate-y-[-5px]">
                    <div class="aspect-[2/3] relative">
                        <img src="${m.poster}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/80 opacity-0 group-hover:opacity-100 transition flex flex-col items-center justify-center gap-4">
                            <a href="${m.link}" target="_blank" class="bg-red-600 h-12 w-12 rounded-full flex items-center justify-center"><i class="fa fa-play text-white"></i></a>
                            <button onclick="handleDownload('${m.download}', '${m.id}')" class="bg-white text-black px-4 py-1 rounded-xl text-[10px] font-black uppercase">Download</button>
                        </div>
                    </div>
                    <div class="p-3 text-center">
                        <h4 class="text-[10px] font-black truncate uppercase">${m.title}</h4>
                        <p class="text-[8px] text-zinc-500 font-bold uppercase mt-1">${m.category} • ${m.year}</p>
                    </div>
                </div>
            `).join('');
        }

        function filterMovies(cat) {
            // Update Active Class on buttons
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active-cat'));
            event.target.classList.add('active-cat');

            if(cat === 'all') renderHome(allMovies);
            else {
                const filtered = allMovies.filter(m => m.category === cat);
                renderHome(filtered);
            }
        }

        function renderAdmin() {
            const list = document.getElementById('adminMovieList');
            list.innerHTML = allMovies.map(m => `
                <div class="flex items-center justify-between glass p-3 rounded-xl">
                    <p class="font-bold text-[10px] uppercase">${m.title} (${m.category})</p>
                    <button onclick="deleteMovie('${m.id}')" class="text-red-500 text-xs hover:scale-110 transition"><i class="fa fa-trash"></i></button>
                </div>
            `).join('');
        }

        function deleteMovie(id) { if(confirm("Urashaka gusiba iyi filime?")) database.ref('movies/' + id).remove(); }
    </script>
