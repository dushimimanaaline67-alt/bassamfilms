<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BASSAM FILMS | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .page { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .glass { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .red-gradient { background: linear-gradient(45deg, #e50914, #ff4d4d); }
        .category-btn.active-cat { background-color: #e50914; color: white; border-color: #e50914; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-[100] px-6 py-4 flex justify-between items-center glass border-b border-white/5">
        <h1 onclick="location.reload()" class="text-red-600 text-2xl font-black italic cursor-pointer tracking-tighter">BASSAM FILMS</h1>
        <div class="flex items-center gap-4 text-xs font-bold">
            <button onclick="location.reload()" class="hover:text-red-500 transition">HOME</button>
            <a href="https://github.com" target="_blank" class="bg-zinc-800 px-4 py-2 rounded-full hover:bg-zinc-700 transition">UPLOAD (GITHUB)</a>
        </div>
    </nav>

    <section id="page-home" class="page active pt-24 min-h-screen">
        <div class="px-6 mb-8">
            <div class="relative h-[250px] md:h-[350px] w-full rounded-[2.5rem] overflow-hidden flex items-center p-8 md:p-12">
                <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=2025" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-r from-black via-black/40 to-transparent"></div>
                <div class="relative z-10">
                    <span class="bg-red-600 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest italic">Trending Now</span>
                    <h2 class="text-4xl md:text-6xl font-black mt-4 uppercase leading-tight italic">Filime <br> <span class="text-red-600">Zigezweho</span></h2>
                </div>
            </div>
        </div>

        <div class="px-6 mb-8 overflow-x-auto no-scrollbar flex gap-3">
            <button onclick="filterMovies('all')" class="category-btn active-cat px-6 py-2 rounded-xl border border-zinc-800 text-[10px] font-black whitespace-nowrap transition">ZOSE</button>
            <button onclick="filterMovies('trending')" class="category-btn px-6 py-2 rounded-xl border border-zinc-800 text-[10px] font-black whitespace-nowrap transition uppercase">Trending</button>
            <button onclick="filterMovies('action')" class="category-btn px-6 py-2 rounded-xl border border-zinc-800 text-[10px] font-black whitespace-nowrap transition uppercase">Action</button>
            <button onclick="filterMovies('season')" class="category-btn px-6 py-2 rounded-xl border border-zinc-800 text-[10px] font-black whitespace-nowrap transition uppercase">Series/Season</button>
            <button onclick="filterMovies('india')" class="category-btn px-6 py-2 rounded-xl border border-zinc-800 text-[10px] font-black whitespace-nowrap transition uppercase">India</button>
            <button onclick="filterMovies('cartoon')" class="category-btn px-6 py-2 rounded-xl border border-zinc-800 text-[10px] font-black whitespace-nowrap transition uppercase">Cartoons</button>
        </div>

        <div class="px-6 pb-24">
            <div class="flex flex-col md:flex-row justify-between md:items-center mb-8 gap-4">
                <h3 id="categoryTitle" class="text-xl font-black uppercase tracking-tighter border-l-4 border-red-600 pl-4">Zose</h3>
                <div class="relative">
                    <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                    <input type="text" id="search" oninput="searchMovies()" placeholder="Shaka movie hano..." class="bg-zinc-900 border border-zinc-800 pl-10 pr-4 py-3 rounded-2xl text-sm outline-none focus:border-red-600 w-full md:w-80">
                </div>
            </div>
            <div id="movieGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
                <p class="col-span-full text-center py-20 text-gray-500 italic animate-pulse">Irimo gufunguka...</p>
            </div>
        </div>
    </section>

    <script>
        let allMovies = [];

        // 1. Gusoma amakuru muri movies.json kuri GitHub
        async function loadMovies() {
            try {
                const response = await fetch('movies.json');
                allMovies = await response.json();
                renderMovies(allMovies);
            } catch (error) {
                console.error("Error loading JSON:", error);
                document.getElementById('movieGrid').innerHTML = `
                    <div class="col-span-full text-center py-20">
                        <p class="text-red-500 font-bold">Nta movies.json yabonetse muri folder yawe!</p>
                        <p class="text-xs text-gray-500 mt-2">Kora file yitwa movies.json uyishyire kuri GitHub.</p>
                    </div>`;
            }
        }

        function renderMovies(data) {
            const grid = document.getElementById('movieGrid');
            if(data.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center py-20 text-gray-600 italic">Nta filime ziri muri iki cyiciro...</p>`;
                return;
            }
            grid.innerHTML = data.map(m => `
                <div class="group bg-zinc-950 rounded-[2rem] overflow-hidden shadow-2xl hover:-translate-y-2 transition-all duration-300">
                    <div class="aspect-[2/3] relative">
                        <img src="${m.poster}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/80 opacity-0 group-hover:opacity-100 transition flex flex-col items-center justify-center gap-4">
                            <a href="${m.link}" target="_blank" class="bg-red-600 h-14 w-14 rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition">
                                <i class="fa fa-play text-white text-xl ml-1"></i>
                            </a>
                            <a href="${m.download}" target="_blank" class="bg-white/10 backdrop-blur-md border border-white/20 px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-white hover:text-black transition">
                                <i class="fa fa-download mr-1"></i> Download
                            </a>
                        </div>
                    </div>
                    <div class="p-4">
                        <h4 class="text-[13px] font-black truncate uppercase tracking-tighter">${m.title}</h4>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-[9px] text-red-600 font-black uppercase italic">${m.category}</span>
                            <span class="text-[9px] text-gray-500 font-bold">${m.year}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterMovies(cat) {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active-cat');
                if(btn.innerText.toLowerCase() === cat.toLowerCase()) btn.classList.add('active-cat');
            });
            if(cat === 'all') document.querySelectorAll('.category-btn')[0].classList.add('active-cat');

            const filtered = cat === 'all' ? allMovies : allMovies.filter(m => m.category.toLowerCase() === cat.toLowerCase());
            document.getElementById('categoryTitle').innerText = cat;
            renderMovies(filtered);
        }

        function searchMovies() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = allMovies.filter(m => m.title.toLowerCase().includes(term));
            renderMovies(filtered);
        }

        // Tangira gusoma filime
        loadMovies();
    </script>
</body>
</html>
