    <style>

<body>

                <div class="relative z-10 space-y-4">
                    <div class="flex items-center gap-2">
                        <span class="bg-red-600 h-2 w-2 rounded-full animate-pulse"></span>
                        <span class="text-red-500 text-[10px] font-black uppercase tracking-[0.2em]">Live updates</span>
                    </div>
                    <h2 class="text-4xl md:text-7xl font-black uppercase italic leading-none tracking-tighter">AGASOBANUYE <br> <span class="text-red-600">BASSAM</span></h2>
                    <button onclick="downloadApp()" class="red-gradient text-white px-8 py-3 rounded-2xl text-[11px] font-black uppercase hover:scale-105 transition shadow-2xl border border-white/10 flex items-center gap-3">
                        <i class="fa fa-download"></i> Yishyire muri Telefone (Install App)
                    </button>
                </div>

        <div class="px-4 md:px-10 mb-6">
            <div class="relative">
                <input type="text" id="searchInput" oninput="searchMovies()" placeholder="Shakisha filime..." class="search-input w-full py-4 px-6 rounded-2xl text-sm border border-white/5">
                <i class="fa fa-search absolute right-6 top-4 text-zinc-500"></i>
            </div>
        </div>

        <div class="px-4 md:px-10 mb-8 overflow-x-auto no-scrollbar flex gap-2">
            <button onclick="filterMovies('all')" class="cat-btn active-cat px-6 py-2.5 rounded-xl text-[10px] font-black whitespace-nowrap uppercase">Zose</button>
            <button onclick="filterMovies('trending')" class="cat-btn category-btn px-6 py-2.5 rounded-xl text-[10px] font-black whitespace-nowrap uppercase">Trending</button>
            <button onclick="filterMovies('action')" class="cat-btn category-btn px-6 py-2.5 rounded-xl text-[10px] font-black whitespace-nowrap uppercase">Action</button>
            <button onclick="filterMovies('season')" class="cat-btn category-btn px-6 py-2.5 rounded-xl text-[10px] font-black whitespace-nowrap uppercase">Season</button>
            <button onclick="filterMovies('india')" class="cat-btn category-btn px-6 py-2.5 rounded-xl text-[10px] font-black whitespace-nowrap uppercase">Indian</button>
        </div>

        <div class="px-4 md:px-10 pb-24">
            <div id="movieGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 md:gap-6"></div>

    <div id="notifBox" class="glass max-w-[280px]">
        <div class="flex items-center gap-3 mb-3">
            <div class="bg-red-600 h-8 w-8 rounded-lg flex items-center justify-center text-white text-xs font-bold">BF</div>
            <p class="text-[11px] font-black uppercase tracking-tight">Emeza ubutumwa <br><span class="text-zinc-500 font-bold text-[9px]">Umenye filime nshya</span></p>
        </div>
        <div class="flex gap-2">
            <button onclick="enableNotif()" class="flex-1 red-gradient py-2 rounded-lg text-[9px] font-black uppercase">Emeza</button>
            <button onclick="closeNotif()" class="flex-1 bg-zinc-800 py-2 rounded-lg text-[9px] font-black uppercase text-zinc-400">Oya</button>
        </div>

    <section id="page-login" class="page pt-44 h-screen px-6">
        <div class="max-w-md mx-auto glass p-10 rounded-[2.5rem] text-center border border-white/5">
            <h2 class="text-2xl font-black mb-8 italic text-red-600">ADMIN</h2>
            <input type="text" id="userIn" placeholder="Username" class="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl mb-4 outline-none text-sm">
            <input type="password" id="passIn" placeholder="Password" class="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl mb-4 outline-none text-sm">
            <button onclick="handleLogin()" class="w-full red-gradient py-4 rounded-xl font-black uppercase">Injira</button>
        </div>
    </section>

    <section id="page-admin" class="page pt-24 px-4 md:px-10 min-h-screen">
        <div class="max-w-6xl mx-auto grid lg:grid-cols-3 gap-10">
            <div class="glass p-8 rounded-[2rem] h-fit border border-white/5">
                <h3 class="font-black text-red-600 mb-6 uppercase text-sm">Ongeramo Filime</h3>
                <div class="space-y-3">
                    <input type="text" id="mTitle" placeholder="Izina" class="w-full bg-black p-3 rounded-lg outline-none text-xs border border-zinc-800">
                    <input type="text" id="mYear" placeholder="Umwaka" class="w-full bg-black p-3 rounded-lg outline-none text-xs border border-zinc-800">
                    <select id="mCat" class="w-full bg-black p-3 rounded-lg outline-none text-xs border border-zinc-800">
                        <option value="trending">Trending</option>
                        <option value="action">Action</option>
                        <option value="season">Season</option>
                        <option value="india">Indian</option>
                    </select>
                    <input type="text" id="mLink" placeholder="Watch Link" class="w-full bg-black p-3 rounded-lg outline-none text-xs border border-zinc-800">
                    <input type="text" id="mDL" placeholder="Download Link" class="w-full bg-black p-3 rounded-lg outline-none text-xs border border-zinc-800">
                    <input type="text" id="mPoster" placeholder="Poster URL" class="w-full bg-black p-3 rounded-lg outline-none text-xs border border-zinc-800">
                    <button onclick="saveToFirebase()" class="w-full red-gradient py-3 rounded-lg font-black uppercase text-xs shadow-lg">Save & Notify</button>
                </div>
            </div>
            <div id="adminMovieList" class="lg:col-span-2 space-y-3"></div>
        </div>
    </section>

    <a href="https://wa.me/250781626371" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <script>
        // FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBlq2acq1pUcZAecjemVxS1UoVaPrOMAQc",
            authDomain: "bassamfilms-1d584.firebaseapp.com",
            databaseURL: "https://bassamfilms-1d584-default-rtdb.firebaseio.com",
            projectId: "bassamfilms-1d584",
            storageBucket: "bassamfilms-1d584.firebasestorage.app",
            messagingSenderId: "313527595091",
            appId: "1:313527595091:web:53847778813445832a56a6"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const smartLink = "https://www.profitablecpmratenetwork.com/x66g8e2ere?key=5ff83b3548a532596c7420d3474a1354";

        let allMovies = [];
        let deferredPrompt;

        // INSTALL APP LOGIC (A2HS)
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        function downloadApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((result) => {
                    if (result.outcome === 'accepted') { console.log('Install success'); }
                    deferredPrompt = null;
                });
            } else {
                alert("Kuri Android: Kanda utudomo dutatu hejuru iburyo, ukande 'Install App' cyangwa 'Add to Home Screen'. \n\nKuri iPhone: Kanda agasanduku gafite akambi (Share), ukande 'Add to Home Screen'.");
            }
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${id}`).classList.add('active');
            window.scrollTo(0,0);
        }

        function handleLogin() {
            if(document.getElementById('userIn').value === "bassam" && document.getElementById('passIn').value === "54321") showPage('admin');
            else alert("Error!");
        }

        function handleDownload(realLink, movieId) {
            const hasClicked = localStorage.getItem('ad_' + movieId);
            if (!hasClicked) { window.open(smartLink, '_blank'); localStorage.setItem('ad_' + movieId, 'true'); }
            else { window.open(realLink, '_blank'); localStorage.removeItem('ad_' + movieId); }
        }

        // NOTIFICATIONS
        setTimeout(() => { if(!localStorage.getItem('notif_set')) document.getElementById('notifBox').style.display = 'block'; }, 6000);
        function closeNotif() { document.getElementById('notifBox').style.display = 'none'; localStorage.setItem('notif_set', 'declined'); }
        function enableNotif() {
            Notification.requestPermission().then(perm => {
                if(perm === 'granted') {
                    localStorage.setItem('notif_set', 'granted');
                    document.getElementById('notifBox').style.display = 'none';
                    new Notification("BASSAM FILMS", { body: "Murakoze! Muzajya mubona filime nshya hano." });
                }
            });
        }

        function saveToFirebase() {
            const movieData = {
                title: document.getElementById('mTitle').value,
                year: document.getElementById('mYear').value,
                category: document.getElementById('mCat').value,
                link: document.getElementById('mLink').value,
                download: document.getElementById('mDL').value,
                poster: document.getElementById('mPoster').value
            };
            if(movieData.title && movieData.link) {
                database.ref('movies').push(movieData).then(() => {
                    if (Notification.permission === "granted") new Notification("BASSAM FILMS", { body: "Filime Nshya: " + movieData.title });
                    alert("Done!");
                    location.reload();
                });
            }
        }

        database.ref('movies').on('value', (snap) => {
            allMovies = [];
            snap.forEach((c) => { allMovies.unshift({ id: c.key, ...c.val() }); });
            renderHome(allMovies);
            renderAdmin();
        });

        function renderHome(data) {
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = data.map(m => `
                <div class="group movie-card bg-zinc-900/40 rounded-2xl overflow-hidden transition-all duration-500 hover:scale-[1.03] border border-white/5">
                    <div class="aspect-[2/3] relative overflow-hidden">
                        <img src="${m.poster}" class="w-full h-full object-cover transition duration-700 group-hover:scale-110">
                        <div class="poster-overlay absolute inset-0 bg-black/80 opacity-0 transition-opacity flex flex-col items-center justify-center gap-3 backdrop-blur-sm">
                            <a href="${m.link}" target="_blank" class="bg-red-600 h-12 w-12 rounded-full flex items-center justify-center shadow-xl transform translate-y-4 group-hover:translate-y-0 transition duration-300"><i class="fa fa-play text-white text-sm"></i></a>
                            <button onclick="handleDownload('${m.download}', '${m.id}')" class="bg-white text-black px-5 py-2 rounded-xl text-[9px] font-black uppercase transform translate-y-4 group-hover:translate-y-0 transition duration-300 delay-75">Download</button>
                        </div>
                        <div class="absolute top-2 right-2 bg-red-600 text-[8px] font-black px-2 py-1 rounded shadow-lg uppercase">${m.year}</div>
                    </div>
                    <div class="p-3">
                        <h4 class="text-[10px] font-black truncate text-zinc-100 uppercase tracking-tight">${m.title}</h4>
                        <p class="text-[8px] text-zinc-500 font-bold uppercase mt-1 tracking-widest">${m.category}</p>
                    </div>
                </div>
            `).join('');
        }

        function searchMovies() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            renderHome(allMovies.filter(m => m.title.toLowerCase().includes(val)));
        }

        function filterMovies(cat) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active-cat'));
            event.target.classList.add('active-cat');
            if(cat === 'all') renderHome(allMovies);
            else renderHome(allMovies.filter(m => m.category === cat));
        }

        function renderAdmin() {
            document.getElementById('adminMovieList').innerHTML = allMovies.map(m => `
                <div class="flex items-center justify-between glass p-3 rounded-xl border border-white/5">
                    <div class="flex items-center gap-4">
                        <img src="${m.poster}" class="h-10 w-8 object-cover rounded shadow-lg">
                        <p class="font-black text-[10px] uppercase">${m.title}</p>
                    </div>
                    <button onclick="deleteMovie('${m.id}')" class="h-8 w-8 rounded-full bg-red-600/10 text-red-500 hover:bg-red-600 hover:text-white transition flex items-center justify-center"><i class="fa fa-trash-alt text-[10px]"></i></button>
                </div>
            `).join('');
        }
        function deleteMovie(id) { if(confirm("Siba?")) database.ref('movies/' + id).remove(); }
    </script>
    <script src="https://pl29262747.profitablecpmratenetwork.com/b8/8c/78/b88c7804903a5c3aad18a89feff2edf3.js"></script>
</body>
