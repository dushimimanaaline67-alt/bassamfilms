<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BASSAM FILMS | Agasobanuye</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .page { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .red-gradient { background: linear-gradient(45deg, #e50914, #ff4d4d); }
        .skeleton { background: linear-gradient(90deg, #121212 25%, #1d1d1d 50%, #121212 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 1rem; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .hero-bg { background: linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=2059'); background-size: cover; background-position: center; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-[100] px-4 md:px-10 py-3 flex justify-between items-center glass">
        <div class="flex items-center gap-4">
            <div class="h-10 w-10 bg-red-600 rounded-lg flex items-center justify-center font-black italic text-xl shadow-lg border border-white/10">BF</div>
            <h1 onclick="showPage('home')" class="text-white text-lg md:text-xl font-black cursor-pointer uppercase tracking-tighter">BASSAM FILMS</h1>
        </div>
        <div>
            <button onclick="showPage('login')" class="red-gradient px-5 py-1.5 rounded-full text-[10px] font-black uppercase shadow-lg hover:scale-105 transition">Admin</button>
        </div>
    </nav>

    <section id="page-home" class="page active pt-20 min-h-screen">
        
        <div class="px-4 md:px-10 mb-10 mt-6">
            <div class="hero-bg relative h-[250px] md:h-[400px] w-full rounded-[2.5rem] overflow-hidden flex flex-col justify-center p-8 md:p-16 shadow-2xl border border-white/5">
                <div class="relative z-10 space-y-2">
                    <h2 class="text-5xl md:text-8xl font-black uppercase italic leading-none tracking-tighter">
                        BASSAM <span class="text-red-600">FILMS</span>
                    </h2>
                    <p class="text-white text-sm md:text-xl font-bold uppercase tracking-tight bg-red-600 w-fit px-4 py-1 rounded-lg shadow-lg">
                        REBA FILM UNA DOWNILOADINGE KUBUNTU
                    </p>
                    <div class="pt-4 flex items-center gap-4 text-zinc-400 text-[10px] md:text-xs font-bold uppercase tracking-widest">
                        <span><i class="fa fa-check text-red-600 mr-2"></i> HD Quality</span>
                        <span><i class="fa fa-check text-red-600 mr-2"></i> Agasobanuye Neza</span>
                        <span><i class="fa fa-check text-red-600 mr-2"></i> No Subscription</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="px-4 md:px-10 mb-8 overflow-x-auto no-scrollbar flex gap-2">
            <button onclick="filterMovies('all')" class="cat-btn active-cat px-6 py-2.5 rounded-xl text-[10px] font-black whitespace-nowrap uppercase border border-white/10">Zose</button>
            <button onclick="filterMovies('trending')" class="cat-btn px-6 py-2.5 rounded-xl text-[10px] font-black whitespace-nowrap uppercase border border-zinc-800 text-zinc-500">Trending</button>
            <button onclick="filterMovies('action')" class="cat-btn px-6 py-2.5 rounded-xl text-[10px] font-black whitespace-nowrap uppercase border border-zinc-800 text-zinc-500">Action</button>
            <button onclick="filterMovies('season')" class="cat-btn px-6 py-2.5 rounded-xl text-[10px] font-black whitespace-nowrap uppercase border border-zinc-800 text-zinc-500">Season</button>
            <button onclick="filterMovies('india')" class="cat-btn px-6 py-2.5 rounded-xl text-[10px] font-black whitespace-nowrap uppercase border border-zinc-800 text-zinc-500">Indian</button>
        </div>

        <div class="px-4 md:px-10 pb-24">
            <div id="movieGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 md:gap-6">
                <div class="skeleton aspect-[2/3]"></div>
                <div class="skeleton aspect-[2/3]"></div>
                <div class="skeleton aspect-[2/3]"></div>
                <div class="skeleton aspect-[2/3]"></div>
            </div>
        </div>
    </section>

    <section id="page-login" class="page pt-44 h-screen px-6">
        <div class="max-w-md mx-auto glass p-10 rounded-[2.5rem] text-center border border-white/5">
            <h2 class="text-2xl font-black mb-8 italic text-red-600 uppercase">Admin Access</h2>
            <input type="text" id="userIn" placeholder="Username" class="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl mb-4 outline-none text-sm focus:border-red-600 transition">
            <input type="password" id="passIn" placeholder="Password" class="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl mb-4 outline-none text-sm focus:border-red-600 transition">
            <button onclick="handleLogin()" class="w-full red-gradient py-4 rounded-xl font-black uppercase tracking-widest shadow-xl">Injira</button>
        </div>
    </section>

    <section id="page-admin" class="page pt-24 px-4 md:px-10 min-h-screen">
        <div class="max-w-6xl mx-auto grid lg:grid-cols-3 gap-10">
            <div class="glass p-8 rounded-[2rem] h-fit border border-white/5 sticky top-24">
                <h3 id="adminTitle" class="font-black text-red-600 mb-6 uppercase text-xs tracking-widest">Ongeramo Filime</h3>
                <div class="space-y-3">
                    <input type="hidden" id="editId">
                    <input type="text" id="mTitle" placeholder="Izina rya filime" class="w-full bg-black p-3 rounded-lg outline-none text-xs border border-zinc-800">
                    <input type="text" id="mSoba" placeholder="Umusobanuzi (urugero: Rocky)" class="w-full bg-black p-3 rounded-lg outline-none text-xs border border-zinc-800">
                    <input type="text" id="mYear" placeholder="Umwaka" class="w-full bg-black p-3 rounded-lg outline-none text-xs border border-zinc-800">
                    <select id="mCat" class="w-full bg-black p-3 rounded-lg outline-none text-xs border border-zinc-800 text-zinc-500">
                        <option value="trending">Trending</option>
                        <option value="action">Action</option>
                        <option value="season">Season</option>
                        <option value="india">Indian</option>
                    </select>
                    <input type="text" id="mLink" placeholder="Watch Link (YouTube/Web)" class="w-full bg-black p-3 rounded-lg outline-none text-xs border border-zinc-800">
                    <input type="text" id="mDL" placeholder="Download Link" class="w-full bg-black p-3 rounded-lg outline-none text-xs border border-zinc-800">
                    <input type="text" id="mPoster" placeholder="Poster Image URL" class="w-full bg-black p-3 rounded-lg outline-none text-xs border border-zinc-800">
                    <button id="saveBtn" onclick="saveToFirebase()" class="w-full red-gradient py-3 rounded-lg font-black uppercase text-xs shadow-lg">Bika Filime</button>
                    <button id="cancelEdit" onclick="resetForm()" class="hidden w-full bg-zinc-800 py-3 rounded-lg font-black uppercase text-[10px] mt-2">Hagarika Edit</button>
                </div>
            </div>
            <div id="adminMovieList" class="lg:col-span-2 space-y-3 pb-20"></div>
        </div>
    </section>

    <a href="https://wa.me/250781626371" class="fixed bottom-6 right-6 h-14 w-14 bg-[#25d366] text-white rounded-full flex items-center justify-center text-2xl shadow-2xl z-[1000]" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        // FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBlq2acq1pUcZAecjemVxS1UoVaPrOMAQc",
            authDomain: "bassamfilms-1d584.firebaseapp.com",
            databaseURL: "https://bassamfilms-1d584-default-rtdb.firebaseio.com",
            projectId: "bassamfilms-1d584",
            storageBucket: "bassamfilms-1d584.firebasestorage.app",
            messagingSenderId: "313527595091",
            appId: "1:313527595091:web:53847778813445832a56a6"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let allMovies = [];

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${id}`).classList.add('active');
            window.scrollTo(0,0);
        }

        function handleLogin() {
            if(document.getElementById('userIn').value === "bassam" && document.getElementById('passIn').value === "54321") showPage('admin');
            else alert("Error!");
        }

        database.ref('movies').on('value', (snap) => {
            allMovies = [];
            snap.forEach((c) => { allMovies.unshift({ id: c.key, ...c.val() }); });
            renderHome(allMovies);
            renderAdmin();
        });

        function renderHome(data) {
            const grid = document.getElementById('movieGrid');
            if(data.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center text-zinc-700 py-20 uppercase font-black tracking-widest text-xs">Nta filime n'imwe ihari...</p>`;
                return;
            }
            grid.innerHTML = data.map(m => `
                <div class="group relative bg-zinc-900/40 rounded-2xl overflow-hidden border border-white/5 transition hover:border-red-600/30">
                    <div class="aspect-[2/3] relative overflow-hidden bg-zinc-800">
                        <img src="${m.poster}" class="w-full h-full object-cover transition duration-700 group-hover:scale-110" onload="this.parentElement.style.background='none'">
                        <div class="absolute inset-0 bg-black/80 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center gap-3">
                            <a href="${m.link}" target="_blank" class="bg-red-600 h-10 w-10 rounded-full flex items-center justify-center shadow-xl"><i class="fa fa-play text-white text-xs"></i></a>
                            <a href="${m.download}" target="_blank" class="bg-white text-black px-4 py-1.5 rounded-lg text-[9px] font-black uppercase">Download</a>
                        </div>
                        <div class="absolute top-2 right-2 bg-red-600 text-[7px] font-black px-2 py-1 rounded shadow-lg uppercase">${m.year}</div>
                    </div>
                    <div class="p-3">
                        <h4 class="text-[10px] font-black text-zinc-100 uppercase leading-tight">
                            ${m.title} 
                            ${m.soba ? `<span class="text-red-600 ml-1 italic lowercase">[soba: ${m.soba}]</span>` : ''}
                        </h4>
                    </div>
                </div>
            `).join('');
        }

        function filterMovies(cat) {
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('active-cat', 'border-white/10', 'text-white');
                btn.classList.add('border-zinc-800', 'text-zinc-500');
            });
            event.target.classList.add('active-cat', 'border-white/10', 'text-white');
            if(cat === 'all') renderHome(allMovies);
            else renderHome(allMovies.filter(m => m.category === cat));
        }

        // ADMIN LOGIC
        function saveToFirebase() {
            const id = document.getElementById('editId').value;
            const movieData = {
                title: document.getElementById('mTitle').value,
                year: document.getElementById('mYear').value,
                soba: document.getElementById('mSoba').value,
                category: document.getElementById('mCat').value,
                link: document.getElementById('mLink').value,
                download: document.getElementById('mDL').value,
                poster: document.getElementById('mPoster').value
            };

            if(movieData.title && movieData.link) {
                if(id) {
                    database.ref('movies/' + id).update(movieData).then(() => { resetForm(); });
                } else {
                    database.ref('movies').push(movieData).then(() => { resetForm(); });
                }
            }
        }

        function editMovie(id) {
            const m = allMovies.find(item => item.id === id);
            document.getElementById('editId').value = m.id;
            document.getElementById('mTitle').value = m.title;
            document.getElementById('mYear').value = m.year;
            document.getElementById('mSoba').value = m.soba || '';
            document.getElementById('mCat').value = m.category;
            document.getElementById('mLink').value = m.link;
            document.getElementById('mDL').value = m.download;
            document.getElementById('mPoster').value = m.poster;
            document.getElementById('adminTitle').innerText = "HINDURA FILIME";
            document.getElementById('saveBtn').innerText = "Update Now";
            document.getElementById('cancelEdit').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('adminTitle').innerText = "ONGERAMO FILIME";
            document.getElementById('saveBtn').innerText = "BIKA FILIME";
            document.getElementById('cancelEdit').classList.add('hidden');
            document.querySelectorAll('#page-admin input, #page-admin select').forEach(i => i.value = '');
        }

        function renderAdmin() {
            document.getElementById('adminMovieList').innerHTML = allMovies.map(m => `
                <div class="flex items-center justify-between glass p-3 rounded-xl border border-white/5">
                    <div class="flex items-center gap-4">
                        <img src="${m.poster}" class="h-10 w-8 object-cover rounded shadow-md">
                        <div>
                            <p class="font-black text-[10px] uppercase text-white">${m.title}</p>
                            <p class="text-[8px] text-red-500 uppercase italic">Soba: ${m.soba || '---'}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editMovie('${m.id}')" class="h-8 w-8 rounded-full bg-blue-600/10 text-blue-500 hover:bg-blue-600 hover:text-white transition flex items-center justify-center"><i class="fa fa-edit text-[10px]"></i></button>
                        <button onclick="deleteMovie('${m.id}')" class="h-8 w-8 rounded-full bg-red-600/10 text-red-500 hover:bg-red-600 hover:text-white transition flex items-center justify-center"><i class="fa fa-trash-alt text-[10px]"></i></button>
                    </div>
                </div>
            `).join('');
        }
        function deleteMovie(id) { if(confirm("Siba?")) database.ref('movies/' + id).remove(); }
    </script>
</body>
</html>
