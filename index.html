<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BASSAM FILMS | Agasobanuye</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .page { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .red-gradient { background: linear-gradient(45deg, #e50914, #ff4d4d); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .movie-card:hover img { transform: scale(1.05); transition: 0.5s; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-[100] px-4 md:px-10 py-3 flex justify-between items-center glass">
        <div class="flex items-center gap-4">
            <div onclick="showPage('home')" class="h-10 w-10 bg-red-600 rounded-lg flex items-center justify-center font-black italic text-xl shadow-lg border border-white/10 cursor-pointer">BF</div>
            <h1 onclick="showPage('home')" class="text-white text-lg md:text-xl font-black cursor-pointer uppercase tracking-tighter">BASSAM FILMS</h1>
        </div>
        <button onclick="showPage('login')" class="red-gradient px-5 py-1.5 rounded-full text-[10px] font-black uppercase">Admin</button>
    </nav>

    <section id="page-home" class="page active pt-20 min-h-screen">
        <div class="px-4 md:px-10 mb-10 mt-6">
            <div class="relative h-[250px] md:h-[350px] w-full rounded-[2.5rem] overflow-hidden flex flex-col justify-center p-8 border border-white/5 shadow-2xl">
                <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=2059" class="absolute inset-0 w-full h-full object-cover opacity-40">
                <div class="absolute inset-0 bg-gradient-to-r from-black via-black/80 to-transparent"></div>
                <div class="relative z-10">
                    <h2 class="text-5xl md:text-7xl font-black uppercase italic leading-none tracking-tighter">BASSAM <span class="text-red-600">FILMS</span></h2>
                    <p class="text-white text-xs md:text-base font-bold uppercase mt-2 bg-red-600 w-fit px-3 py-1 rounded">REBA FILM UNA DOWNILOADINGE KUBUNTU</p>
                </div>
            </div>
        </div>

        <div class="px-4 md:px-10 pb-24">
            <div id="movieGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
        </div>
    </section>

    <section id="page-details" class="page pt-20 min-h-screen pb-20">
        <div class="px-4 md:px-10 max-w-7xl mx-auto">
            <button onclick="showPage('home')" class="text-zinc-500 hover:text-white mb-6 flex items-center gap-2 text-xs font-bold uppercase transition">
                <i class="fa fa-arrow-left"></i> Subira Inyuma
            </button>

            <div class="grid lg:grid-cols-3 gap-10">
                <div class="lg:col-span-2 space-y-6">
                    <div id="trailerBox" class="aspect-video w-full rounded-3xl overflow-hidden bg-zinc-900 border border-white/5 shadow-2xl">
                        </div>
                    
                    <div class="flex flex-wrap gap-4">
                        <a id="watchBtn" href="#" target="_blank" class="flex-1 min-w-[150px] red-gradient py-4 rounded-2xl flex items-center justify-center gap-3 font-black uppercase text-sm shadow-xl hover:scale-[1.02] transition">
                            <i class="fa fa-play"></i> Reba Filime
                        </a>
                        <a id="downloadBtn" href="#" target="_blank" class="flex-1 min-w-[150px] bg-white text-black py-4 rounded-2xl flex items-center justify-center gap-3 font-black uppercase text-sm shadow-xl hover:scale-[1.02] transition">
                            <i class="fa fa-download"></i> Download
                        </a>
                    </div>

                    <div class="p-6 bg-zinc-900/50 rounded-3xl border border-white/5">
                        <h2 id="detTitle" class="text-3xl font-black uppercase">---</h2>
                        <div class="flex gap-4 mt-2 text-[10px] font-bold text-zinc-500 uppercase tracking-widest">
                            <span id="detYear">---</span>
                            <span class="text-red-600">●</span>
                            <span id="detCat">---</span>
                            <span class="text-red-600">●</span>
                            <span id="detSoba" class="text-red-500 italic">---</span>
                        </div>
                    </div>
                </div>

                <div class="space-y-6">
                    <h3 class="text-sm font-black uppercase text-zinc-500 tracking-widest px-2">Izindi zishobora kugushimisha</h3>
                    <div id="relatedGrid" class="grid grid-cols-1 gap-4"></div>
                </div>
            </div>
        </div>
    </section>

    <section id="page-login" class="page pt-44 h-screen px-6">
        <div class="max-w-md mx-auto glass p-10 rounded-[2.5rem] text-center">
            <h2 class="text-2xl font-black mb-8 italic text-red-600 uppercase">Admin</h2>
            <input type="text" id="userIn" placeholder="Username" class="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl mb-4 outline-none">
            <input type="password" id="passIn" placeholder="Password" class="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl mb-4 outline-none">
            <button onclick="handleLogin()" class="w-full red-gradient py-4 rounded-xl font-black uppercase">Injira</button>
        </div>
    </section>

    <section id="page-admin" class="page pt-24 px-4 md:px-10 min-h-screen">
        <div class="max-w-6xl mx-auto grid lg:grid-cols-3 gap-10">
            <div class="glass p-8 rounded-[2rem] h-fit border border-white/5 sticky top-24">
                <h3 id="adminTitle" class="font-black text-red-600 mb-6 uppercase text-xs">Ongeramo Filime</h3>
                <div class="space-y-3">
                    <input type="hidden" id="editId">
                    <input type="text" id="mTitle" placeholder="Izina rya filime" class="w-full bg-black p-3 rounded-lg text-xs border border-zinc-800">
                    <input type="text" id="mSoba" placeholder="Umusobanuzi" class="w-full bg-black p-3 rounded-lg text-xs border border-zinc-800">
                    <input type="text" id="mYear" placeholder="Umwaka" class="w-full bg-black p-3 rounded-lg text-xs border border-zinc-800">
                    <input type="text" id="mTrailer" placeholder="YouTube Trailer Link" class="w-full bg-black p-3 rounded-lg text-xs border border-zinc-800">
                    <select id="mCat" class="w-full bg-black p-3 rounded-lg text-xs border border-zinc-800">
                        <option value="Action">Action</option>
                        <option value="Season">Season</option>
                        <option value="Indian">Indian</option>
                    </select>
                    <input type="text" id="mLink" placeholder="Watch Link" class="w-full bg-black p-3 rounded-lg text-xs border border-zinc-800">
                    <input type="text" id="mDL" placeholder="Download Link" class="w-full bg-black p-3 rounded-lg text-xs border border-zinc-800">
                    <input type="text" id="mPoster" placeholder="Poster URL" class="w-full bg-black p-3 rounded-lg text-xs border border-zinc-800">
                    <button onclick="saveToFirebase()" class="w-full red-gradient py-3 rounded-lg font-black uppercase text-xs">Bika Filime</button>
                </div>
            </div>
            <div id="adminMovieList" class="lg:col-span-2 space-y-3 pb-20"></div>
        </div>
    </section>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBlq2acq1pUcZAecjemVxS1UoVaPrOMAQc",
            authDomain: "bassamfilms-1d584.firebaseapp.com",
            databaseURL: "https://bassamfilms-1d584-default-rtdb.firebaseio.com",
            projectId: "bassamfilms-1d584",
            storageBucket: "bassamfilms-1d584.firebasestorage.app",
            messagingSenderId: "313527595091",
            appId: "1:313527595091:web:53847778813445832a56a6"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let allMovies = [];

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${id}`).classList.add('active');
            window.scrollTo(0,0);
        }

        function handleLogin() {
            if(document.getElementById('userIn').value === "bassam" && document.getElementById('passIn').value === "54321") showPage('admin');
        }

        database.ref('movies').on('value', (snap) => {
            allMovies = [];
            snap.forEach((c) => { allMovies.unshift({ id: c.key, ...c.val() }); });
            renderHome();
            renderAdmin();
        });

        function renderHome() {
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = allMovies.map(m => `
                <div onclick="openMovie('${m.id}')" class="group cursor-pointer">
                    <div class="aspect-[2/3] relative rounded-2xl overflow-hidden border border-white/5 bg-zinc-800">
                        <img src="${m.poster}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <i class="fa fa-play-circle text-4xl text-red-600"></i>
                        </div>
                    </div>
                    <h4 class="mt-3 text-[10px] font-black uppercase text-zinc-100 leading-tight">
                        ${m.title} ${m.soba ? `<span class="text-red-600 ml-1 italic">[soba: ${m.soba}]</span>` : ''}
                    </h4>
                </div>
            `).join('');
        }

        function openMovie(id) {
            const m = allMovies.find(item => item.id === id);
            if(!m) return;

            document.getElementById('detTitle').innerText = m.title;
            document.getElementById('detYear').innerText = m.year;
            document.getElementById('detCat').innerText = m.category;
            document.getElementById('detSoba').innerText = m.soba ? `Soba: ${m.soba}` : '';
            document.getElementById('watchBtn').href = m.link;
            document.getElementById('downloadBtn').href = m.download;

            // Trailer
            const videoId = m.trailer ? m.trailer.split('v=')[1]?.split('&')[0] || m.trailer.split('/').pop() : '';
            document.getElementById('trailerBox').innerHTML = m.trailer ? 
                `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allowfullscreen></iframe>` : 
                `<img src="${m.poster}" class="w-full h-full object-cover opacity-20">`;

            // Related
            const related = allMovies.filter(item => item.id !== id).slice(0, 4);
            document.getElementById('relatedGrid').innerHTML = related.map(r => `
                <div onclick="openMovie('${r.id}')" class="flex gap-4 p-2 hover:bg-white/5 rounded-xl transition cursor-pointer">
                    <img src="${r.poster}" class="h-20 w-16 rounded-lg object-cover">
                    <div>
                        <p class="text-[10px] font-black uppercase text-white">${r.title}</p>
                        <p class="text-[8px] text-zinc-500 uppercase mt-1">${r.category} • ${r.year}</p>
                    </div>
                </div>
            `).join('');

            showPage('details');
        }

        // ADMIN FUNCTIONS (Nizindi twari dufite)
        function saveToFirebase() {
            const id = document.getElementById('editId').value;
            const data = {
                title: document.getElementById('mTitle').value,
                soba: document.getElementById('mSoba').value,
                year: document.getElementById('mYear').value,
                trailer: document.getElementById('mTrailer').value,
                category: document.getElementById('mCat').value,
                link: document.getElementById('mLink').value,
                download: document.getElementById('mDL').value,
                poster: document.getElementById('mPoster').value
            };
            if(id) database.ref('movies/' + id).update(data).then(() => resetForm());
            else database.ref('movies').push(data).then(() => resetForm());
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.querySelectorAll('#page-admin input').forEach(i => i.value = '');
            document.getElementById('adminTitle').innerText = "ONGERAMO FILIME";
        }

        function renderAdmin() {
            document.getElementById('adminMovieList').innerHTML = allMovies.map(m => `
                <div class="flex items-center justify-between glass p-3 rounded-xl border border-white/5">
                    <div class="flex items-center gap-4 text-[10px] font-black uppercase">
                        <img src="${m.poster}" class="h-10 w-8 object-cover rounded">
                        <p>${m.title}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editMovie('${m.id}')" class="h-8 w-8 rounded-full bg-blue-600/10 text-blue-500 flex items-center justify-center"><i class="fa fa-edit"></i></button>
                        <button onclick="deleteMovie('${m.id}')" class="h-8 w-8 rounded-full bg-red-600/10 text-red-500 flex items-center justify-center"><i class="fa fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }
        function editMovie(id) {
            const m = allMovies.find(i => i.id === id);
            document.getElementById('editId').value = m.id;
            document.getElementById('mTitle').value = m.title;
            document.getElementById('mSoba').value = m.soba || '';
            document.getElementById('mYear').value = m.year;
            document.getElementById('mTrailer').value = m.trailer || '';
            document.getElementById('mCat').value = m.category;
            document.getElementById('mLink').value = m.link;
            document.getElementById('mDL').value = m.download;
            document.getElementById('mPoster').value = m.poster;
            document.getElementById('adminTitle').innerText = "HINDURA FILIME";
            showPage('admin');
        }
        function deleteMovie(id) { if(confirm("Siba?")) database.ref('movies/' + id).remove(); }
    </script>
</body>
</html>
