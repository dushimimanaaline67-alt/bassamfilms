<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BASSAM FILMS | Official Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .page { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .red-gradient { background: linear-gradient(45deg, #e50914, #ff4d4d); }
        .category-btn { border: 1px solid #27272a; transition: 0.3s; color: #a1a1aa; }
        .active-cat { background-color: #e50914; color: white; border-color: #e50914; box-shadow: 0 4px 15px rgba(229, 9, 20, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .movie-card:hover img { transform: scale(1.1); filter: brightness(0.5); }
    </style>
</head>
<body>

    <nav class="fixed w-full z-[100] px-6 py-4 flex justify-between items-center glass border-b border-white/5">
        <h1 onclick="showPage('home')" class="text-red-600 text-2xl font-black italic cursor-pointer tracking-tighter hover:scale-105 transition">BASSAM FILMS</h1>
        <div class="flex items-center gap-6">
            <button onclick="showPage('home')" class="text-xs font-bold hover:text-red-500 transition uppercase tracking-widest">Home</button>
            <button onclick="showPage('login')" class="red-gradient px-5 py-2 rounded-full text-[10px] font-black shadow-lg shadow-red-600/20 hover:brightness-110 transition">ADMIN PANEL</button>
        </div>
    </nav>

    <section id="page-home" class="page active pt-24 min-h-screen">
        <div class="px-6 mb-10">
            <div class="relative h-[250px] md:h-[400px] w-full rounded-[2.5rem] overflow-hidden flex items-center p-8 md:p-12 shadow-2xl">
                <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=2025" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-r from-black via-black/60 to-transparent"></div>
                <div class="relative z-10 space-y-4">
                    <span class="bg-red-600 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-[0.2em] italic shadow-lg">Trending Now</span>
                    <h2 class="text-4xl md:text-6xl font-black uppercase italic leading-tight">Reba Filime <br> <span class="text-red-600">Zikunzwe Cyane</span></h2>
                    <p class="text-gray-400 text-xs md:text-sm max-w-md font-medium">Urubuga rwa mbere mu Rwanda rwereka filime nshya mu buryo bwa HD. Reba cyangwa imanure filime ukanze rimwe gusa.</p>
                </div>
            </div>
        </div>

        <div class="px-6 mb-8 overflow-x-auto no-scrollbar flex gap-3">
            <button onclick="filterMovies('all')" class="category-btn active-cat px-6 py-2.5 rounded-2xl text-[10px] font-black whitespace-nowrap">ZOSE</button>
            <button onclick="filterMovies('trending')" class="category-btn px-6 py-2.5 rounded-2xl text-[10px] font-black whitespace-nowrap uppercase">Trending Now</button>
            <button onclick="filterMovies('action')" class="category-btn px-6 py-2.5 rounded-2xl text-[10px] font-black whitespace-nowrap uppercase">Action</button>
            <button onclick="filterMovies('season')" class="category-btn px-6 py-2.5 rounded-2xl text-[10px] font-black whitespace-nowrap uppercase">Series / Seasons</button>
            <button onclick="filterMovies('india')" class="category-btn px-6 py-2.5 rounded-2xl text-[10px] font-black whitespace-nowrap uppercase">Indian</button>
            <button onclick="filterMovies('cartoon')" class="category-btn px-6 py-2.5 rounded-2xl text-[10px] font-black whitespace-nowrap uppercase">Cartoons</button>
        </div>

        <div class="px-6 pb-24">
            <div class="flex flex-col md:flex-row justify-between md:items-center mb-10 gap-4">
                <h3 id="categoryTitle" class="text-xl font-black uppercase tracking-widest border-l-4 border-red-600 pl-4 italic">Zose</h3>
                <div class="relative">
                    <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                    <input type="text" id="search" oninput="searchMovies()" placeholder="Shaka movie hano..." class="bg-zinc-900 border border-zinc-800 pl-12 pr-4 py-3 rounded-2xl text-sm outline-none focus:border-red-600 w-full md:w-80 transition-all">
                </div>
            </div>
            <div id="movieGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 md:gap-8">
                </div>
        </div>
    </section>

    <section id="page-login" class="page pt-44 h-screen px-6">
        <div class="max-w-md mx-auto glass p-10 rounded-[3rem] shadow-2xl text-center border border-white/5">
            <div class="bg-red-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-red-600/30">
                <i class="fa fa-lock text-2xl"></i>
            </div>
            <h2 class="text-2xl font-black mb-2 italic">ADMIN ACCESS</h2>
            <p class="text-gray-500 text-xs mb-8">Injira hano kugira ngo wongereho Filime nshya</p>
            <div class="space-y-4 text-left">
                <input type="text" id="userIn" placeholder="Username" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl outline-none focus:border-red-600 transition">
                <input type="password" id="passIn" placeholder="Password" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl outline-none focus:border-red-600 transition">
                <button onclick="handleLogin()" class="w-full red-gradient py-4 rounded-2xl font-black tracking-widest shadow-lg shadow-red-600/20 hover:scale-[1.02] transition">INJIRA</button>
            </div>
        </div>
    </section>

    <section id="page-admin" class="page pt-24 px-6 min-h-screen">
        <div class="max-w-6xl mx-auto grid lg:grid-cols-3 gap-10">
            <div class="glass p-8 rounded-[2.5rem] h-fit sticky top-28">
                <h3 class="font-black text-red-600 mb-6 uppercase text-sm tracking-widest">Ongeramo Filime</h3>
                <div class="space-y-4">
                    <input type="text" id="mTitle" placeholder="Izina rya Movie" class="w-full bg-black border border-zinc-800 p-3.5 rounded-xl outline-none text-sm focus:border-red-600">
                    <input type="text" id="mYear" placeholder="Umwaka (2026)" class="w-full bg-black border border-zinc-800 p-3.5 rounded-xl outline-none text-sm focus:border-red-600">
                    <select id="mCat" class="w-full bg-black border border-zinc-800 p-3.5 rounded-xl outline-none text-sm text-gray-400">
                        <option value="trending">Trending Now</option>
                        <option value="action">Action</option>
                        <option value="season">Season / Series</option>
                        <option value="india">Indian Movie</option>
                        <option value="cartoon">Cartoon</option>
                    </select>
                    <input type="text" id="mLink" placeholder="Watch Link (YouTube/Drive)" class="w-full bg-black border border-zinc-800 p-3.5 rounded-xl outline-none text-sm focus:border-red-600">
                    <input type="text" id="mDL" placeholder="Download Link" class="w-full bg-black border border-zinc-800 p-3.5 rounded-xl outline-none text-sm focus:border-red-600">
                    <input type="text" id="mPoster" placeholder="Poster URL (https://...jpg)" class="w-full bg-black border border-zinc-800 p-3.5 rounded-xl outline-none text-sm focus:border-red-600">
                    <button onclick="saveToFirebase()" class="w-full red-gradient py-4 rounded-xl font-black text-sm shadow-lg shadow-red-600/20 hover:scale-[1.02] transition">SAVE TO FIREBASE</button>
                </div>
            </div>
            <div class="lg:col-span-2 space-y-4">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-black text-gray-500 uppercase text-xs tracking-widest">Filime ziriho ubu</h3>
                    <button onclick="location.reload()" class="text-[10px] bg-zinc-800 px-3 py-1 rounded-lg">Refresh</button>
                </div>
                <div id="adminMovieList" class="grid gap-3">
                    </div>
            </div>
        </div>
    </section>

    <script>
        // --- FIREBASE INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyBlq2acq1pUcZAecjemVxS1UoVaPrOMAQc",
            authDomain: "bassamfilms-1d584.firebaseapp.com",
            databaseURL: "https://bassamfilms-1d584-default-rtdb.firebaseio.com",
            projectId: "bassamfilms-1d584",
            storageBucket: "bassamfilms-1d584.firebasestorage.app",
            messagingSenderId: "313527595091",
            appId: "1:313527595091:web:53847778813445832a56a6",
            measurementId: "G-LM1J8KQ0XC"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let movies = [];

        // --- NAVIGATION ---
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${id}`).classList.add('active');
            window.scrollTo(0,0);
        }

        function handleLogin() {
            const u = document.getElementById('userIn').value;
            const p = document.getElementById('passIn').value;
            if(u === "bassam" && p === "54321") {
                showPage('admin');
            } else { alert("Login failed! Username cyangwa Password ntabwo ariyo."); }
        }

        // --- DATA LOGIC ---
        function saveToFirebase() {
            const title = document.getElementById('mTitle').value;
            const year = document.getElementById('mYear').value;
            const cat = document.getElementById('mCat').value;
            const link = document.getElementById('mLink').value;
            const dl = document.getElementById('mDL').value;
            const poster = document.getElementById('mPoster').value;

            if(!title || !poster) return alert("Uzuza nibura Izina n'Ifoto!");

            const movieData = {
                title, year, category: cat, link, download: dl, poster
            };

            database.ref('movies').push(movieData).then(() => {
                alert("Movie yashyizweho neza kuri Firebase!");
                document.getElementById('mTitle').value = "";
                document.getElementById('mLink').value = "";
                document.getElementById('mDL').value = "";
                document.getElementById('mPoster').value = "";
            }).catch(err => alert("Error: " + err));
        }

        // Gusoma amakuru Online
        database.ref('movies').on('value', (snapshot) => {
            movies = [];
            snapshot.forEach((childSnapshot) => {
                movies.unshift({ id: childSnapshot.key, ...childSnapshot.val() });
            });
            renderHome(movies);
            renderAdmin();
        });

        function renderHome(data) {
            const grid = document.getElementById('movieGrid');
            if(data.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center py-20 text-zinc-600 italic">Nta movie zirashyirwaho...</p>`;
                return;
            }
            grid.innerHTML = data.map(m => `
                <div class="movie-card group relative bg-zinc-900 rounded-[2.2rem] overflow-hidden shadow-2xl transition duration-500">
                    <div class="aspect-[2/3] relative overflow-hidden">
                        <img src="${m.poster}" class="w-full h-full object-cover transition duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-black/80 opacity-0 group-hover:opacity-100 transition-all duration-300 flex flex-col items-center justify-center gap-4">
                            <a href="${m.link}" target="_blank" class="bg-red-600 h-14 w-14 rounded-full flex items-center justify-center scale-50 group-hover:scale-100 transition duration-300 shadow-xl">
                                <i class="fa fa-play text-white text-xl ml-1"></i>
                            </a>
                            <a href="${m.download}" target="_blank" class="bg-white/10 backdrop-blur-md border border-white/20 px-5 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-white hover:text-black transition transform translate-y-4 group-hover:translate-y-0 duration-300">
                                <i class="fa fa-download mr-1"></i> Download
                            </a>
                        </div>
                        <div class="absolute top-4 left-4">
                            <span class="bg-red-600/90 backdrop-blur-md px-2 py-0.5 rounded text-[8px] font-black uppercase italic shadow-lg">New</span>
                        </div>
                    </div>
                    <div class="p-4">
                        <h4 class="text-[13px] font-black truncate uppercase tracking-tighter group-hover:text-red-600 transition">${m.title}</h4>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-[9px] text-red-500 font-black uppercase italic">${m.category}</span>
                            <span class="text-[9px] text-zinc-500 font-bold">${m.year}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderAdmin() {
            const list = document.getElementById('adminMovieList');
            list.innerHTML = movies.map(m => `
                <div class="flex items-center justify-between glass p-4 rounded-2xl hover:border-red-600/30 transition">
                    <div class="flex items-center gap-4">
                        <img src="${m.poster}" class="h-12 w-10 rounded-lg object-cover shadow-md">
                        <div>
                            <p class="font-black text-xs uppercase tracking-tight">${m.title}</p>
                            <p class="text-[9px] text-red-600 font-bold uppercase italic">${m.category} | ${m.year}</p>
                        </div>
                    </div>
                    <button onclick="deleteMovie('${m.id}')" class="h-10 w-10 flex items-center justify-center rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition">
                        <i class="fa fa-trash-can text-sm"></i>
                    </button>
                </div>
            `).join('');
        }

        function deleteMovie(id) {
            if(confirm("Uremeza ko ushaka gusiba iyi movie burundu?")) {
                database.ref('movies/' + id).remove();
            }
        }

        function filterMovies(cat) {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active-cat');
                if(btn.innerText.toLowerCase().includes(cat.toLowerCase())) btn.classList.add('active-cat');
            });
            if(cat === 'all') document.querySelectorAll('.category-btn')[0].classList.add('active-cat');

            const filtered = cat === 'all' ? movies : movies.filter(m => m.category.toLowerCase() === cat.toLowerCase());
            document.getElementById('categoryTitle').innerText = cat;
            renderHome(filtered);
        }

        function searchMovies() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = movies.filter(m => m.title.toLowerCase().includes(term));
            renderHome(filtered);
        }
    </script>
</body>
</html>
