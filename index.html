<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BASSAM FILMS | Agasobanuye</title>
    
    <link rel="shortcut icon" type="image/x-icon" href="b.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background: linear-gradient(rgba(5, 5, 5, 0.85), rgba(5, 5, 5, 0.95)), url('NO.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; 
        }

        .page { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .red-gradient { background: linear-gradient(45deg, #e50914, #ff4d4d); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* LOADING ANIMATION (SKELETON) */
        .skeleton {
            background: linear-gradient(90deg, #18181b 25%, #27272a 50%, #18181b 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        /* AUTO-SLIDER SMOOTH SCROLL */
        #trendingGrid { scroll-behavior: smooth; }

        @media (max-width: 640px) {
            #trendingGrid { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 12px; }
            .trending-card { min-width: calc(50% - 6px); scroll-snap-align: start; }
        }

        .trending-card {
            position: relative; aspect-ratio: 2/3; border-radius: 1.5rem; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s;
        }
        .trending-card:hover { transform: scale(1.05); border-color: #e50914; }

        .cat-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 18px; border-radius: 12px; font-size: 10px; font-weight: 900;
            text-transform: uppercase; white-space: nowrap; transition: 0.3s; color: #888;
        }
        .cat-btn.active-cat { background: #e50914; color: white; border-color: #e50914; }

        /* NOTIFICATION BOX */
        #notifBox {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 200; background: #111; border: 1px solid #e50914;
            padding: 15px 25px; border-radius: 20px; display: none; width: 90%; max-width: 400px;
        }
    </style>
</head>
<body>

    <!-- Notification Prompt -->
    <div id="notifBox" class="shadow-2xl">
        <div class="flex items-center gap-4">
            <i class="fa fa-bell text-red-600 text-xl"></i>
            <div class="flex-1">
                <p class="text-[10px] font-black uppercase">Bassam Notifications</p>
                <p class="text-[8px] text-zinc-400">Emera kumenyeshwa film nshya zigezeho!</p>
            </div>
            <button onclick="enableNotifs()" class="bg-red-600 px-4 py-1.5 rounded-lg text-[9px] font-black uppercase">Emera</button>
        </div>
    </div>

    <nav class="fixed w-full z-[100] px-4 md:px-10 py-3 flex justify-between items-center glass">
        <div class="flex items-center gap-4">
            <div onclick="showPage('home')" class="h-10 w-10 bg-red-600 rounded-lg flex items-center justify-center font-black italic text-xl shadow-lg border border-white/10 cursor-pointer">BF</div>
            <h1 onclick="showPage('home')" class="text-white text-lg md:text-xl font-black cursor-pointer uppercase tracking-tighter">BASSAM FILMS</h1>
        </div>
        <button onclick="showPage('login')" class="red-gradient px-5 py-1.5 rounded-full text-[10px] font-black uppercase">Admin</button>
    </nav>

    <!-- HOME PAGE -->
    <section id="page-home" class="page active pt-20 min-h-screen">
        <div class="px-4 md:px-10 mt-6 text-center py-10">
            <h2 class="text-6xl md:text-8xl font-black uppercase italic leading-none tracking-tighter">BASSAM <span class="text-red-600">FILMS</span></h2>
            <p class="text-white text-[10px] md:text-sm font-bold uppercase mt-4 bg-red-600 w-fit px-6 py-1.5 rounded-full shadow-lg mx-auto">REBA FILM UNA DOWNILOADINGE KUBUNTU</p>
        </div>

        <div id="trendingSection" class="px-4 md:px-10 mb-10">
            <h3 class="text-red-600 font-black italic mb-4 uppercase text-xs tracking-widest flex items-center gap-2"><i class="fa fa-bolt"></i> HOT MOVIES</h3>
            <div id="trendingGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 no-scrollbar">
                <div class="trending-card skeleton"></div>
                <div class="trending-card skeleton"></div>
            </div>
        </div>

        <div class="px-4 md:px-10 mt-8 mb-6">
            <input type="text" id="searchInput" oninput="searchMovies()" placeholder="Shakisha filime..." class="w-full bg-zinc-900/80 backdrop-blur-md border border-white/10 py-4 px-6 rounded-2xl text-sm outline-none focus:border-red-600 transition">
        </div>

        <div class="px-4 md:px-10 mb-8 overflow-x-auto no-scrollbar flex gap-2 py-2">
            <button onclick="filterMovies('all')" class="cat-btn active-cat">Zose</button>
            <button onclick="filterMovies('Action')" class="cat-btn">Action</button>
            <button onclick="filterMovies('Horror')" class="cat-btn">Horror</button>
            <button onclick="filterMovies('Romance')" class="cat-btn">Romance</button>
            <button onclick="filterMovies('Indian (Bollywood)')" class="cat-btn">Indian</button>
            <button onclick="filterMovies('Animation')" class="cat-btn">Animation</button>
        </div>

        <div class="px-4 md:px-10 pb-24">
            <div id="movieGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
                <div class="aspect-[2/3] rounded-[1.5rem] skeleton"></div>
                <div class="aspect-[2/3] rounded-[1.5rem] skeleton"></div>
            </div>
        </div>
    </section>

    <!-- DETAILS / WATCH PAGE -->
    <section id="page-details" class="page pt-24 min-h-screen pb-20">
        <div class="px-4 md:px-10 max-w-7xl mx-auto">
            <button onclick="showPage('home')" class="text-zinc-500 hover:text-white mb-6 flex items-center gap-2 text-xs font-bold uppercase transition"><i class="fa fa-arrow-left"></i> Subira Inyuma</button>
            <div class="grid lg:grid-cols-3 gap-10">
                <div class="lg:col-span-2 space-y-6">
                    <div id="trailerBox" class="aspect-video w-full rounded-3xl overflow-hidden bg-zinc-900 border border-white/5 shadow-2xl"></div>
                    <div class="flex flex-wrap gap-4">
                        <a id="watchBtn" href="#" target="_blank" class="flex-1 min-w-[150px] red-gradient py-4 rounded-2xl flex items-center justify-center gap-3 font-black uppercase text-sm shadow-xl hover:scale-[1.02] transition"><i class="fa fa-play"></i> Reba Filime</a>
                        <a id="downloadBtn" href="#" target="_blank" class="flex-1 min-w-[150px] bg-white text-black py-4 rounded-2xl flex items-center justify-center gap-3 font-black uppercase text-sm shadow-xl hover:scale-[1.02] transition"><i class="fa fa-download"></i> Download</a>
                    </div>
                    <div class="p-6 bg-black/60 rounded-3xl border border-white/5 backdrop-blur-md">
                        <h2 id="detTitle" class="text-3xl font-black uppercase tracking-tighter">---</h2>
                        <div class="flex gap-4 mt-2 text-[10px] font-bold text-zinc-500 uppercase tracking-widest">
                            <span id="detYear">---</span>
                            <span class="text-red-600">●</span>
                            <span id="detCat">---</span>
                            <span class="text-red-600">●</span>
                            <span id="detSoba" class="text-red-500 font-black">---</span>
                        </div>
                    </div>
                </div>
                <div class="space-y-6">
                    <h3 class="text-sm font-black uppercase text-zinc-300 tracking-widest px-2">IZINDI FILM ZIGEZWEHO</h3>
                    <div id="relatedGrid" class="grid grid-cols-1 gap-4"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- ADMIN SECTION -->
    <section id="page-admin" class="page pt-24 px-4 md:px-10 min-h-screen pb-20">
        <div class="max-w-6xl mx-auto grid lg:grid-cols-3 gap-10">
            <div class="glass p-8 rounded-[2rem] h-fit border border-white/5">
                <h3 class="font-black text-red-600 mb-6 uppercase text-xs text-center tracking-widest">Admin Control</h3>
                <div class="space-y-3">
                    <input type="hidden" id="editId">
                    <input type="text" id="mTitle" placeholder="Izina rya filime" class="w-full bg-black p-3 rounded-xl text-xs border border-zinc-800 outline-none focus:border-red-600">
                    <input type="text" id="mSoba" placeholder="Umusobanuzi (ex: Rocky)" class="w-full bg-black p-3 rounded-xl text-xs border border-zinc-800 outline-none focus:border-red-600">
                    <input type="text" id="mYear" placeholder="Umwaka" class="w-full bg-black p-3 rounded-xl text-xs border border-zinc-800 outline-none focus:border-red-600">
                    <input type="text" id="mTrailer" placeholder="YouTube Link" class="w-full bg-black p-3 rounded-xl text-xs border border-zinc-800 outline-none focus:border-red-600">
                    <select id="mCat" class="w-full bg-black p-3 rounded-xl text-xs border border-zinc-800 text-zinc-400">
                        <option value="Action">Action</option>
                        <option value="Horror">Horror</option>
                        <option value="Romance">Romance</option>
                        <option value="Indian (Bollywood)">Indian (Bollywood)</option>
                        <option value="Animation">Animation</option>
                    </select>
                    <input type="text" id="mLink" placeholder="Watch Link" class="w-full bg-black p-3 rounded-xl text-xs border border-zinc-800 outline-none focus:border-red-600">
                    <input type="text" id="mDL" placeholder="Download Link" class="w-full bg-black p-3 rounded-xl text-xs border border-zinc-800 outline-none focus:border-red-600">
                    <input type="text" id="mPoster" placeholder="Poster URL" class="w-full bg-black p-3 rounded-xl text-xs border border-zinc-800 outline-none focus:border-red-600">
                    <div class="flex items-center gap-3 p-3 bg-zinc-900 rounded-xl border border-zinc-800">
                        <input type="checkbox" id="mTrending" class="w-4 h-4 accent-red-600">
                        <label class="text-[10px] font-black uppercase text-zinc-400">Trending (Hot)</label>
                    </div>
                    <button onclick="saveToFirebase()" class="w-full red-gradient py-3 rounded-xl font-black uppercase text-xs">Bika Filime</button>
                    <button onclick="resetForm()" class="w-full bg-zinc-800 py-3 rounded-xl font-black uppercase text-[10px]">Hagarika</button>
                </div>
            </div>
            <div id="adminMovieList" class="lg:col-span-2 space-y-3"></div>
        </div>
    </section>

    <!-- LOGIN PAGE -->
    <section id="page-login" class="page pt-44 h-screen px-6">
        <div class="max-w-md mx-auto glass p-10 rounded-[2.5rem] text-center border border-white/5 shadow-2xl">
            <h2 class="text-2xl font-black mb-8 italic text-red-600 uppercase tracking-tighter">Admin Access</h2>
            <input type="text" id="userIn" placeholder="Username" class="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-2xl mb-4 text-white outline-none">
            <input type="password" id="passIn" placeholder="Password" class="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-2xl mb-4 text-white outline-none">
            <button onclick="handleLogin()" class="w-full red-gradient py-4 rounded-2xl font-black uppercase shadow-lg">Injira</button>
        </div>
    </section>

    <footer class="mt-20 py-12 px-6 md:px-10 border-t border-white/5 bg-black/80">
        <div class="max-w-7xl mx-auto flex flex-col items-center text-center">
            <div class="h-12 w-12 bg-red-600 rounded-xl flex items-center justify-center font-black italic text-2xl mb-4 shadow-xl">BF</div>
            <h2 class="text-xl font-black uppercase tracking-tighter mb-4">BASSAM FILMS</h2>
            <div class="flex gap-6 mb-8 text-xl">
                <a href="#" class="hover:text-red-600"><i class="fab fa-facebook"></i></a>
                <a href="#" class="hover:text-red-600"><i class="fab fa-whatsapp"></i></a>
                <a href="#" class="hover:text-red-600"><i class="fab fa-telegram"></i></a>
            </div>
            <p class="text-[9px] font-black uppercase text-zinc-600">&copy; 2026 BASSAM FILMS. BY PACIFIQUE.</p>
        </div>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBlq2acq1pUcZAecjemVxS1UoVaPrOMAQc",
            authDomain: "bassamfilms-1d584.firebaseapp.com",
            databaseURL: "https://bassamfilms-1d584-default-rtdb.firebaseio.com",
            projectId: "bassamfilms-1d584",
            storageBucket: "bassamfilms-1d584.firebasestorage.app",
            messagingSenderId: "313527595091",
            appId: "1:313527595091:web:53847778813445832a56a6"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let allMovies = [];

        // PAGINATION & NOTIFS
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${id}`).classList.add('active');
            window.scrollTo(0,0);
        }

        window.onload = () => {
            setTimeout(() => { document.getElementById('notifBox').style.display = 'block'; }, 3000);
        };

        function enableNotifs() {
            document.getElementById('notifBox').style.display = 'none';
            alert("Ubu uzajya ubonera filime nshya kugihe! Murakoze.");
        }

        function handleLogin() {
            if(document.getElementById('userIn').value === "bassam" && document.getElementById('passIn').value === "54321") showPage('admin');
            else alert("Password ntabwo ariyo!");
        }

        // FIREBASE DATA
        database.ref('movies').on('value', (snap) => {
            allMovies = [];
            snap.forEach((c) => { allMovies.push({ id: c.key, ...c.val() }); });
            allMovies.reverse();
            renderHome(allMovies);
            renderAdmin();
            startAutoSlider();
        });

        function renderHome(data) {
            const grid = document.getElementById('movieGrid');
            const trendingGrid = document.getElementById('trendingGrid');

            const trendingMovies = data.filter(m => m.isTrending);
            if(trendingMovies.length > 0) {
                trendingGrid.innerHTML = trendingMovies.map(m => `
                    <div onclick="openMovie('${m.id}')" class="trending-card">
                        <img src="${m.poster}" class="absolute inset-0 w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent"></div>
                        <div class="absolute bottom-3 left-3 right-3">
                            <p class="text-[10px] font-black uppercase text-white truncate">${m.title}</p>
                            <p class="text-[8px] font-black text-red-500 uppercase">${m.soba || ''}</p>
                        </div>
                    </div>
                `).join('');
            }

            grid.innerHTML = data.map(m => `
                <div onclick="openMovie('${m.id}')" class="group cursor-pointer">
                    <div class="aspect-[2/3] relative rounded-[1.5rem] overflow-hidden border border-white/5 bg-zinc-800">
                        <img src="${m.poster}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    </div>
                    <div class="mt-3">
                        <h4 class="text-[10px] font-black uppercase text-zinc-100 leading-tight truncate">${m.title}</h4>
                        <p class="text-[8px] font-bold text-red-600 uppercase mt-0.5">${m.soba || ''}</p>
                    </div>
                </div>
            `).join('');
        }

        function openMovie(id) {
            const m = allMovies.find(item => item.id === id);
            document.getElementById('detTitle').innerText = m.title;
            document.getElementById('detYear').innerText = m.year;
            document.getElementById('detCat').innerText = m.category;
            document.getElementById('detSoba').innerText = m.soba || '';
            document.getElementById('watchBtn').href = m.link;
            document.getElementById('downloadBtn').href = m.download;

            const videoId = m.trailer ? m.trailer.split('v=')[1]?.split('&')[0] || m.trailer.split('/').pop() : '';
            document.getElementById('trailerBox').innerHTML = m.trailer ? 
                `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allowfullscreen></iframe>` : 
                `<div class="w-full h-full flex items-center justify-center text-zinc-700 font-black uppercase">No Trailer</div>`;

            let related = allMovies.filter(item => item.id !== id && item.category === m.category).slice(0, 5);
            document.getElementById('relatedGrid').innerHTML = related.map(r => `
                <div onclick="openMovie('${r.id}')" class="flex gap-4 p-2 hover:bg-white/5 rounded-xl cursor-pointer">
                    <img src="${r.poster}" class="h-16 w-12 rounded-lg object-cover">
                    <div>
                        <p class="text-[9px] font-black uppercase text-white">${r.title}</p>
                        <p class="text-[7px] text-red-600 font-bold uppercase">${r.soba || ''}</p>
                    </div>
                </div>
            `).join('');
            showPage('details');
        }

        function filterMovies(cat) {
            const btns = document.querySelectorAll('.cat-btn');
            btns.forEach(b => b.classList.remove('active-cat'));
            event.target.classList.add('active-cat');
            if(cat === 'all') renderHome(allMovies);
            else renderHome(allMovies.filter(m => m.category === cat));
        }

        function searchMovies() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            renderHome(allMovies.filter(m => m.title.toLowerCase().includes(val)));
        }

        // AUTO SLIDER (1s)
        let sliderInterval;
        function startAutoSlider() {
            const slider = document.getElementById('trendingGrid');
            if (!slider || sliderInterval) return;
            sliderInterval = setInterval(() => {
                if (slider.scrollLeft + slider.offsetWidth >= slider.scrollWidth) slider.scrollLeft = 0;
                else slider.scrollLeft += 200;
            }, 1000);
        }

        // ADMIN LOGIC
        function saveToFirebase() {
            const id = document.getElementById('editId').value;
            const data = {
                title: document.getElementById('mTitle').value,
                soba: document.getElementById('mSoba').value,
                year: document.getElementById('mYear').value,
                trailer: document.getElementById('mTrailer').value,
                category: document.getElementById('mCat').value,
                link: document.getElementById('mLink').value,
                download: document.getElementById('mDL').value,
                poster: document.getElementById('mPoster').value,
                isTrending: document.getElementById('mTrending').checked
            };
            if(data.title) {
                if(id) database.ref('movies/' + id).update(data).then(() => resetForm());
                else database.ref('movies').push(data).then(() => { resetForm(); alert("Filime yajyaho!"); });
            }
        }

        function renderAdmin() {
            document.getElementById('adminMovieList').innerHTML = allMovies.map(m => `
                <div class="flex items-center justify-between glass p-3 rounded-xl border border-white/5">
                    <div class="flex items-center gap-4 text-[9px] font-black uppercase">
                        <img src="${m.poster}" class="h-10 w-8 object-cover rounded">
                        <p>${m.title} <span class="text-red-500 ml-2">${m.soba || ''}</span></p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editMovie('${m.id}')" class="h-7 w-7 rounded-full bg-blue-600/10 text-blue-500 flex items-center justify-center"><i class="fa fa-edit text-[10px]"></i></button>
                        <button onclick="deleteMovie('${m.id}')" class="h-7 w-7 rounded-full bg-red-600/10 text-red-500 flex items-center justify-center"><i class="fa fa-trash text-[10px]"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function editMovie(id) {
            const m = allMovies.find(i => i.id === id);
            document.getElementById('editId').value = m.id;
            document.getElementById('mTitle').value = m.title;
            document.getElementById('mSoba').value = m.soba || '';
            document.getElementById('mYear').value = m.year;
            document.getElementById('mTrailer').value = m.trailer || '';
            document.getElementById('mCat').value = m.category;
            document.getElementById('mLink').value = m.link;
            document.getElementById('mDL').value = m.download;
            document.getElementById('mPoster').value = m.poster;
            document.getElementById('mTrending').checked = m.isTrending || false;
            showPage('admin');
        }

        function deleteMovie(id) { if(confirm("Siba iyi filime?")) database.ref('movies/' + id).remove(); }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.querySelectorAll('#page-admin input[type="text"]').forEach(i => i.value = '');
            document.getElementById('mTrending').checked = false;
        }
    </script>
</body>
</html>
